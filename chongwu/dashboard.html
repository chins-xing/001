<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宠物百科 - 数据大屏</title>
    <link rel="stylesheet" href="css/yang/yang.css">
    <link rel="stylesheet" href="css/beijing/beijing.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
</head>
<body>
    <canvas id="geoBg" class="geo-bg"></canvas>
    <header class="header">
        <div class="container">
            <h1 class="logo">宠物数据大屏</h1>
            <nav class="nav">
                <a href="index.html" class="nav-link">首页</a>
                <a href="wiki.html" class="nav-link">百科</a>
                <a href="dashboard.html" class="nav-link active">数据大屏</a>
                <a href="jieshao.html" class="nav-link">项目介绍</a>
            </nav>
            <div class="hamburger" id="hamburger">
                <div class="hamburger__line"></div>
                <div class="hamburger__line"></div>
                <div class="hamburger__line"></div>
            </div>
        </div>
    </header>

    <main class="dashboard-main">
        <div class="dashboard-grid">
            <div class="chart-card">
                <h3 class="chart-title">宠物品种分布</h3>
                <div class="chart-container" id="speciesChart"></div>
            </div>

            <div class="chart-card">
                <h3 class="chart-title">热门品种排行</h3>
                <div class="chart-container" id="breedChart"></div>
            </div>

            <div class="chart-card">
                <h3 class="chart-title">养护打卡统计</h3>
                <div class="chart-container" id="checkinChart"></div>
            </div>

            <div class="chart-card">
                <h3 class="chart-title">健康指标</h3>
                <div class="health-grid" id="healthGrid"></div>
            </div>

            <div class="chart-card">
                <h3 class="chart-title">宠物体重对比</h3>
                <div class="chart-container" id="weightChart"></div>
            </div>

            <div class="chart-card">
                <h3 class="chart-title">打卡完成率</h3>
                <div class="chart-container" id="checkinRateChart"></div>
            </div>

            <div class="chart-card full-width">
                <h3 class="chart-title">宠物成长趋势</h3>
                <div class="filter-bar">
                    <label for="petTypeFilter">宠物类型：</label>
                    <select id="petTypeFilter">
                        <option value="all">全部</option>
                        <option value="狗">狗</option>
                        <option value="猫">猫</option>
                        <option value="仓鼠">仓鼠</option>
                        <option value="兔子">兔子</option>
                        <option value="鸟类">鸟类</option>
                        <option value="龙猫">龙猫</option>
                    </select>
                </div>
                <div class="chart-container" id="growthChart"></div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 宠物百科 - 数据大屏</p>
        </div>
    </footer>

    <script src="js/xiao/jiexi.js"></script>
    <script src="js/xiao/caidan.js"></script>
    <script src="js/dongxiao/dongxiao.js"></script>
    <script src="js/beijing/beijing.js"></script>
    <script src="js/jiexi/jiexi-sj.js"></script>
    <script src="js/jichu/dashboard.js"></script>
</body>
</html>
