<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宠物百科 - 知识百科</title>
    <link rel="stylesheet" href="css/yang/yang.css">
    <link rel="stylesheet" href="css/beijing/beijing.css">
</head>
<body>
    <canvas id="geoBg" class="geo-bg"></canvas>
    <header class="header">
        <div class="container">
            <h1 class="logo">宠物百科</h1>
            <nav class="nav">
                <a href="index.html" class="nav-link">首页</a>
                <a href="wiki.html" class="nav-link active">百科</a>
                <a href="dashboard.html" class="nav-link">数据大屏</a>
                <a href="jieshao.html" class="nav-link">项目介绍</a>
            </nav>
            <div class="hamburger" id="hamburger">
                <div class="hamburger__line"></div>
                <div class="hamburger__line"></div>
                <div class="hamburger__line"></div>
            </div>
        </div>
    </header>

    <main class="main wiki-main">
        <div class="container">
            <div class="wiki-sidebar">
                <h3 class="sidebar-title">宠物列表</h3>
                <div class="wiki-filter" id="wikiFilter">
                    <button class="filter-btn active" data-cat="all">全部</button>
                    <button class="filter-btn" data-cat="狗">狗</button>
                    <button class="filter-btn" data-cat="猫">猫</button>
                    <button class="filter-btn" data-cat="仓鼠">仓鼠</button>
                    <button class="filter-btn" data-cat="兔子">兔子</button>
                    <button class="filter-btn" data-cat="鸟类">鸟类</button>
                    <button class="filter-btn" data-cat="龙猫">龙猫</button>
                </div>
                <ul class="pet-list" id="petList"></ul>
            </div>

            <div class="wiki-content">
                <div class="wiki-detail" id="wikiDetail">
                    <div class="wiki-placeholder">
                        <p>请从左侧选择一个宠物查看详情</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 宠物百科 - 让爱宠生活更美好</p>
        </div>
    </footer>

    <script src="js/xiao/jiexi.js"></script>
    <script src="js/xiao/caidan.js"></script>
    <script src="js/dongxiao/dongxiao.js"></script>
    <script src="js/beijing/beijing.js"></script>
    <script src="js/jiexi/jiexi-chong.js"></script>
    <script src="js/jichu/wiki.js"></script>
</body>
</html>
